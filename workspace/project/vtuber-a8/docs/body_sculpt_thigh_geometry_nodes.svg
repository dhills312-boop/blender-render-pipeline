<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
  <defs>
    <style>
      .bg { fill: #17191d; }
      .node { fill: #242832; stroke: #687083; stroke-width: 1.5; rx: 10; }
      .node-main { fill: #2b3442; stroke: #8aa6d9; }
      .node-math { fill: #30283a; stroke: #b48bd7; }
      .node-compare { fill: #2b332a; stroke: #9fc47f; }
      .node-bool { fill: #332d25; stroke: #d1a15f; }
      .node-vector { fill: #263238; stroke: #7dc9c3; }
      .title { fill: #f2f4f8; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #b9c0ce; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .label { fill: #f2f4f8; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .small { fill: #cbd1dc; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
      .tiny { fill: #aeb6c4; font-family: Segoe UI, Arial, sans-serif; font-size: 12px; }
      .port { fill: #d7dce6; stroke: #17191d; stroke-width: 1; }
      .wire-geo { fill: none; stroke: #8aa6d9; stroke-width: 4; }
      .wire-pos { fill: none; stroke: #7dc9c3; stroke-width: 3; }
      .wire-offset { fill: none; stroke: #d78bd2; stroke-width: 3; }
      .wire-mask { fill: none; stroke: #d1a15f; stroke-width: 3; }
      .wire-compare { fill: none; stroke: #9fc47f; stroke-width: 3; }
      .note { fill: #20242c; stroke: #525a6b; stroke-width: 1; rx: 8; }
      .warn { fill: #392b22; stroke: #d1a15f; stroke-width: 1.5; rx: 8; }
    </style>
    <marker id="arrowGeo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8aa6d9"/>
    </marker>
    <marker id="arrowPos" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dc9c3"/>
    </marker>
    <marker id="arrowOffset" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d78bd2"/>
    </marker>
    <marker id="arrowMask" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d1a15f"/>
    </marker>
    <marker id="arrowCompare" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fc47f"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="940"/>
  <text class="title" x="42" y="54">Body_Sculpt Inner Thigh Clearance Geometry Nodes</text>
  <text class="subtitle" x="42" y="82">Blender 4.5 corrected wiring. Live values go into Compare A. Threshold numbers stay in Compare B.</text>

  <!-- Main geometry chain -->
  <rect class="node node-main" x="55" y="125" width="170" height="86"/>
  <text class="label" x="75" y="154">Group Input</text>
  <text class="small" x="75" y="184">Geometry output</text>
  <circle class="port" cx="215" cy="181" r="5"/>

  <rect class="node node-main" x="405" y="112" width="230" height="122"/>
  <text class="label" x="430" y="142">Set Position</text>
  <text class="small" x="430" y="171">Geometry input/output</text>
  <text class="small" x="430" y="194">Selection input</text>
  <text class="small" x="430" y="216">Offset input</text>
  <circle class="port" cx="405" cy="171" r="5"/>
  <circle class="port" cx="405" cy="194" r="5"/>
  <circle class="port" cx="405" cy="216" r="5"/>
  <circle class="port" cx="635" cy="171" r="5"/>

  <rect class="node node-main" x="815" y="125" width="170" height="86"/>
  <text class="label" x="835" y="154">Group Output</text>
  <text class="small" x="835" y="184">Geometry input</text>
  <circle class="port" cx="815" cy="181" r="5"/>

  <path class="wire-geo" marker-end="url(#arrowGeo)" d="M 220 181 C 285 181, 330 171, 400 171"/>
  <path class="wire-geo" marker-end="url(#arrowGeo)" d="M 640 171 C 705 171, 745 181, 810 181"/>

  <!-- Position / Separate XYZ -->
  <rect class="node node-vector" x="55" y="315" width="170" height="78"/>
  <text class="label" x="75" y="344">Position</text>
  <text class="tiny" x="75" y="369">Geometry -> Read</text>
  <circle class="port" cx="215" cy="360" r="5"/>

  <rect class="node node-vector" x="300" y="286" width="190" height="136"/>
  <text class="label" x="320" y="316">Separate XYZ</text>
  <text class="small" x="320" y="345">X output</text>
  <text class="small" x="320" y="372">Y output</text>
  <text class="small" x="320" y="399">Z output</text>
  <circle class="port" cx="300" cy="345" r="5"/>
  <circle class="port" cx="490" cy="345" r="5"/>
  <circle class="port" cx="490" cy="372" r="5"/>
  <circle class="port" cx="490" cy="399" r="5"/>
  <path class="wire-pos" marker-end="url(#arrowPos)" d="M 220 360 C 250 360, 265 345, 295 345"/>

  <!-- Offset branch -->
  <rect class="node node-math" x="600" y="285" width="160" height="72"/>
  <text class="label" x="622" y="314">Math</text>
  <text class="small" x="622" y="339">Operation: Sign</text>
  <circle class="port" cx="600" cy="331" r="5"/>
  <circle class="port" cx="760" cy="331" r="5"/>

  <rect class="node node-math" x="830" y="285" width="190" height="72"/>
  <text class="label" x="852" y="314">Math</text>
  <text class="small" x="852" y="339">Multiply by 0.9</text>
  <circle class="port" cx="830" cy="331" r="5"/>
  <circle class="port" cx="1020" cy="331" r="5"/>

  <rect class="node node-vector" x="1090" y="285" width="180" height="94"/>
  <text class="label" x="1112" y="314">Combine XYZ</text>
  <text class="small" x="1112" y="342">X = push amount</text>
  <text class="small" x="1112" y="363">Y/Z = 0</text>
  <circle class="port" cx="1090" cy="342" r="5"/>
  <circle class="port" cx="1270" cy="342" r="5"/>

  <path class="wire-offset" marker-end="url(#arrowOffset)" d="M 495 345 C 540 345, 555 331, 595 331"/>
  <path class="wire-offset" marker-end="url(#arrowOffset)" d="M 765 331 C 790 331, 805 331, 825 331"/>
  <path class="wire-offset" marker-end="url(#arrowOffset)" d="M 1025 331 C 1050 331, 1065 342, 1085 342"/>
  <path class="wire-offset" marker-end="url(#arrowOffset)" d="M 1275 342 C 1370 342, 1380 216, 640 216 C 525 216, 480 216, 410 216"/>

  <!-- Compare branch -->
  <rect class="node node-compare" x="610" y="470" width="205" height="86"/>
  <text class="label" x="632" y="499">Compare</text>
  <text class="small" x="632" y="525">A = Z</text>
  <text class="small" x="632" y="545">Greater Than B = 45</text>
  <circle class="port" cx="610" cy="526" r="5"/>
  <circle class="port" cx="815" cy="526" r="5"/>

  <rect class="node node-compare" x="610" y="580" width="205" height="86"/>
  <text class="label" x="632" y="609">Compare.001</text>
  <text class="small" x="632" y="635">A = Z</text>
  <text class="small" x="632" y="655">Less Than B = 94</text>
  <circle class="port" cx="610" cy="636" r="5"/>
  <circle class="port" cx="815" cy="636" r="5"/>

  <rect class="node node-math" x="610" y="690" width="170" height="72"/>
  <text class="label" x="632" y="719">Math</text>
  <text class="small" x="632" y="744">Absolute X</text>
  <circle class="port" cx="610" cy="736" r="5"/>
  <circle class="port" cx="780" cy="736" r="5"/>

  <rect class="node node-compare" x="850" y="682" width="205" height="86"/>
  <text class="label" x="872" y="711">Compare.002</text>
  <text class="small" x="872" y="737">A = abs(X)</text>
  <text class="small" x="872" y="757">Less Than B = 8</text>
  <circle class="port" cx="850" cy="737" r="5"/>
  <circle class="port" cx="1055" cy="737" r="5"/>

  <rect class="node node-math" x="610" y="800" width="170" height="72"/>
  <text class="label" x="632" y="829">Math.003</text>
  <text class="small" x="632" y="854">Absolute Y</text>
  <circle class="port" cx="610" cy="846" r="5"/>
  <circle class="port" cx="780" cy="846" r="5"/>

  <rect class="node node-compare" x="850" y="792" width="205" height="86"/>
  <text class="label" x="872" y="821">Compare.003</text>
  <text class="small" x="872" y="847">A = abs(Y)</text>
  <text class="small" x="872" y="867">Less Than B = 16</text>
  <circle class="port" cx="850" cy="847" r="5"/>
  <circle class="port" cx="1055" cy="847" r="5"/>

  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 495 399 C 545 399, 555 526, 605 526"/>
  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 495 399 C 545 399, 555 636, 605 636"/>
  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 495 345 C 540 345, 555 736, 605 736"/>
  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 785 736 C 810 736, 825 737, 845 737"/>
  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 495 372 C 540 372, 555 846, 605 846"/>
  <path class="wire-compare" marker-end="url(#arrowCompare)" d="M 785 846 C 810 846, 825 847, 845 847"/>

  <!-- Boolean AND branch -->
  <rect class="node node-bool" x="910" y="505" width="190" height="76"/>
  <text class="label" x="932" y="534">Boolean Math</text>
  <text class="small" x="932" y="558">AND: Z range</text>
  <circle class="port" cx="910" cy="535" r="5"/>
  <circle class="port" cx="910" cy="558" r="5"/>
  <circle class="port" cx="1100" cy="546" r="5"/>

  <rect class="node node-bool" x="1145" y="610" width="190" height="76"/>
  <text class="label" x="1167" y="639">Boolean Math.001</text>
  <text class="small" x="1167" y="663">AND: add abs(X)</text>
  <circle class="port" cx="1145" cy="640" r="5"/>
  <circle class="port" cx="1145" cy="663" r="5"/>
  <circle class="port" cx="1335" cy="652" r="5"/>

  <rect class="node node-bool" x="1145" y="755" width="190" height="76"/>
  <text class="label" x="1167" y="784">Boolean Math.002</text>
  <text class="small" x="1167" y="808">AND: add abs(Y)</text>
  <circle class="port" cx="1145" cy="785" r="5"/>
  <circle class="port" cx="1145" cy="808" r="5"/>
  <circle class="port" cx="1335" cy="797" r="5"/>

  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 820 526 C 855 526, 870 535, 905 535"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 820 636 C 850 636, 870 558, 905 558"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 1105 546 C 1120 546, 1125 640, 1140 640"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 1060 737 C 1100 737, 1105 663, 1140 663"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 1340 652 C 1372 652, 1372 785, 1140 785"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 1060 847 C 1100 847, 1105 808, 1140 808"/>
  <path class="wire-mask" marker-end="url(#arrowMask)" d="M 1340 797 C 1445 797, 1445 194, 640 194 C 525 194, 480 194, 410 194"/>

  <!-- Notes -->
  <rect class="warn" x="1050" y="112" width="390" height="92"/>
  <text class="label" x="1072" y="142">Critical correction</text>
  <text class="small" x="1072" y="169">Do not plug live values into Compare B.</text>
  <text class="small" x="1072" y="190">A = live value, B = threshold number.</text>

  <rect class="note" x="55" y="735" width="470" height="130"/>
  <text class="label" x="78" y="765">Selection mask</text>
  <text class="small" x="78" y="793">Z &gt; 45 AND Z &lt; 94</text>
  <text class="small" x="78" y="819">AND abs(X) &lt; 8</text>
  <text class="small" x="78" y="845">AND abs(Y) &lt; 16</text>

  <rect class="note" x="55" y="875" width="470" height="42"/>
  <text class="small" x="78" y="902">Offset value: 0.9 local units means about 0.9 cm outward per side because Body_Sculpt scale is 0.01.</text>
</svg>

